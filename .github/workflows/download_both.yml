name: Download (Both Sides)
on:
  workflow_dispatch:
  release:

jobs:
    download:
        strategy:
            matrix:
                os: [macos-latest]
        runs-on: ${{ matrix.os }}
        permissions: write-all
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              
            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                distribution: temurin
                java-version: 21
              
            - name: Download
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: java -jar packwiz-installer-bootstrap.jar -g -s both pack.toml
              
            - name: Capture downloaded jars
              uses: actions/upload-artifact@v4
              with:
                  name: mods
                  path: ./mods
